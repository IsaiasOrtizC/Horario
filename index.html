<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Mi Horario" />
<title>Mi Horario Semanal</title>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #333333;
  --border-hi: #555555;
  --text: #f0ede8;
  --text2: #999990;
  --text3: #555550;
  --accent: #c8102e;
  --accent2: #8a0000;
  --white: #f0ede8;
  --shadow: 0 0 0 1px #333333;
  --shadow-sm: 0 0 0 1px #2a2a2a;
  --radius: 4px;
  --radius-lg: 6px;
  --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; max-width: 600px; margin: 0 auto; }
* { scrollbar-width: thin; scrollbar-color: var(--border-hi) transparent; }

.deco-strip { height: 8px; background: var(--accent); background-image: repeating-linear-gradient(90deg, var(--accent) 0 12px, var(--accent2) 12px 16px, var(--accent) 16px 28px, #000 28px 32px); border-bottom: 1px solid var(--border-hi); }

header { padding: 16px 16px 12px; background: var(--bg); border-bottom: 1px solid var(--border-hi); position: sticky; top: 0; z-index: 20; }
.header-inner { display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 20px; font-weight: 900; letter-spacing: 2px; line-height: 1; text-transform: uppercase; color: var(--white); }
header h1 span { display:inline-block; color:var(--accent); margin-left:6px; font-size:18px; }
.header-sub { font-size:9px; font-weight:700; color:var(--text3); margin-top:4px; letter-spacing:1.5px; text-transform:uppercase; }
.share-btn { background: transparent; color: var(--text2); border: 1px solid var(--border-hi); border-radius: var(--radius); padding: 7px 12px; font-family: var(--font); font-size: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
.share-btn:hover { color:var(--white); border-color:var(--white); }

/* READONLY BANNER */
.readonly-banner { background: var(--accent); color: #fff; padding: 8px 16px; border-bottom: 1px solid var(--border-hi); font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; }

.tabs { display:flex; background:var(--bg); border-bottom:1px solid var(--border-hi); position:sticky; top:63px; z-index:19; }
.tab { flex:1; padding:10px 2px; font-size:9px; font-family:var(--font); font-weight:900; color:var(--text3); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; text-transform:uppercase; letter-spacing:1px; transition:all 0.15s; }
.tab.active { border-bottom-color:var(--accent); color:var(--white); background:transparent; }

.panel { display:none; padding:16px; } .panel.active { display:block; }
.section-title { font-size:9px; font-weight:900; color:var(--text3); text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; margin-top:20px; border-left:2px solid var(--accent); padding-left:8px; }
.section-title:first-child { margin-top:0; }

input[type="text"], select { font-family:var(--font); font-size:14px; font-weight:700; color:var(--text); background:var(--surface2); border:1px solid var(--border-hi); border-radius:var(--radius); padding:9px 12px; outline:none; -webkit-appearance:none; transition:border-color 0.15s; }
input[type="text"]:focus, select:focus { border-color:var(--accent); }
input[type="color"] { width:42px; height:42px; border:1px solid var(--border-hi); border-radius:var(--radius); padding:2px; background:var(--surface2); cursor:pointer; }

.btn { padding:9px 16px; font-family:var(--font); font-size:11px; font-weight:900; background:var(--white); color:#000; border:1px solid var(--border-hi); border-radius:var(--radius); cursor:pointer; white-space:nowrap; text-transform:uppercase; letter-spacing:1.2px; transition:all 0.15s; }
.btn:active { opacity:0.7; }
.btn-outline { background:transparent; color:var(--text2); border-color:var(--border-hi); }
.btn-outline:hover { color:var(--white); border-color:var(--white); }
.btn-neon1 { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn-neon2 { background:transparent; color:var(--white); border:1px solid var(--border-hi); }
.btn-neon4 { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn-danger { background:transparent; color:#c8102e; border:1px solid #c8102e44; }

.legend-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.chip { display:flex; align-items:center; gap:6px; padding:5px 12px; border-radius:2px; border:1px solid var(--border-hi); background:transparent; font-size:10px; font-weight:900; cursor:pointer; transition:all 0.12s; user-select:none; -webkit-user-select:none; text-transform:uppercase; letter-spacing:1px; color:var(--text2); }
.chip:active { opacity:0.6; }
.chip.selected { color:#000 !important; border-color:transparent; }
.chip-dot { width:8px; height:8px; border-radius:1px; flex-shrink:0; }

.day-nav { display:flex; gap:5px; overflow-x:auto; padding-bottom:6px; margin-bottom:14px; scrollbar-width:none; }
.day-nav::-webkit-scrollbar { display:none; }
.day-btn { flex-shrink:0; padding:6px 10px; border-radius:2px; border:1px solid var(--border); background:transparent; font-family:var(--font); font-size:10px; font-weight:900; color:var(--text3); cursor:pointer; text-transform:uppercase; letter-spacing:0.8px; transition:all 0.12s; text-align:center; }
.day-btn:active { opacity:0.6; }
.day-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

.schedule-wrap { background:var(--surface); border-radius:0; overflow:hidden; border:1px solid var(--border); }
.schedule-row { display:flex; align-items:stretch; border-bottom:1px solid var(--border); min-height:46px; }
.schedule-row:last-child { border-bottom:none; }
.schedule-row:nth-child(even) { background:var(--surface2); }
.time-col { width:50px; flex-shrink:0; display:flex; align-items:center; justify-content:flex-end; padding:0 8px 0 0; font-size:9px; font-weight:900; color:var(--text3); border-right:1px solid var(--border); text-transform:uppercase; letter-spacing:0.5px; }
.event-col { flex:1; padding:4px 6px; display:flex; align-items:center; cursor:pointer; min-height:46px; transition:background 0.1s; }
.event-col:active { background:var(--surface2); }
.event-block { width:100%; padding:6px 10px; border-radius:2px; border:1px solid; font-size:11px; font-weight:900; display:flex; align-items:center; justify-content:space-between; text-transform:uppercase; letter-spacing:0.8px; }
.perm-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; margin-left:6px; }

.month-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.month-title { font-size:15px; font-weight:900; text-transform:uppercase; letter-spacing:2px; color:var(--white); }
.month-arrow { width:32px; height:32px; border-radius:2px; border:1px solid var(--border-hi); background:transparent; font-size:16px; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; font-family:var(--font); color:var(--text2); }
.month-arrow:hover { color:var(--white); border-color:var(--white); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cal-dow { font-size:8px; font-weight:900; color:var(--text3); text-align:center; text-transform:uppercase; letter-spacing:0.8px; padding:4px 0 6px; }
.cal-day { min-height:52px; border-radius:2px; border:1px solid var(--border); background:var(--surface); padding:5px 3px 4px; cursor:pointer; transition:border-color 0.12s; }
.cal-day:active { opacity:0.6; }
.cal-day.empty { border-color:transparent; background:transparent; cursor:default; }
.cal-day.today { border-color:var(--accent); background:var(--surface2); }
.cal-day.has-activity { border-color:var(--border-hi); }
.cal-day-num { font-size:10px; font-weight:900; text-align:center; margin-bottom:5px; color:var(--text2); }
.cal-day.today .cal-day-num { color:var(--accent); }
.cal-dots { display:flex; flex-wrap:wrap; gap:2px; justify-content:center; padding:0 2px; }
.cal-dot { width:6px; height:6px; border-radius:1px; flex-shrink:0; }

.perm-form { background:var(--surface); border-radius:0; padding:16px; margin-bottom:16px; border:1px solid var(--border); }
.field { margin-bottom:12px; }
.field label { display:block; font-size:9px; font-weight:900; color:var(--text3); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:5px; }
.field input[type="text"], .field select { width:100%; }
.time-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.day-checks { display:flex; flex-wrap:wrap; gap:5px; }
.day-toggle { display:inline-flex; align-items:center; padding:5px 10px; border-radius:2px; border:1px solid var(--border); background:transparent; font-family:var(--font); font-size:10px; font-weight:900; color:var(--text3); cursor:pointer; text-transform:uppercase; letter-spacing:0.8px; transition:all 0.12s; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
.day-toggle:active { opacity:0.6; }
.day-toggle.active { background:var(--accent); color:#fff; border-color:var(--accent); }

.perm-list { display:flex; flex-direction:column; gap:6px; }
.perm-item { background:var(--surface); border-radius:0; border:1px solid var(--border); border-left:3px solid var(--border-hi); padding:12px 14px; display:flex; align-items:center; gap:10px; }
.perm-color { width:10px; height:10px; border-radius:1px; flex-shrink:0; }
.perm-info { flex:1; min-width:0; }
.perm-name { font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:0.8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
.perm-meta { font-size:10px; color:var(--text3); font-weight:700; margin-top:2px; letter-spacing:0.5px; }
.empty-state { text-align:center; padding:28px 16px; color:var(--text3); font-size:12px; font-weight:700; background:transparent; border:1px dashed var(--border); letter-spacing:0.5px; }
.add-cat-row { display:flex; gap:8px; align-items:center; margin-bottom:6px; }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:0; border-top:1px solid var(--border-hi); border-left:1px solid var(--border-hi); border-right:1px solid var(--border-hi); padding:20px 20px 44px; width:100%; max-width:600px; max-height:88vh; overflow-y:auto; }
.modal-handle { width:32px; height:3px; border-radius:0; background:var(--border-hi); margin:0 auto 20px; }
.modal h3 { font-size:18px; font-weight:900; margin-bottom:12px; letter-spacing:1px; text-transform:uppercase; color:var(--white); }
.modal label { display:block; font-size:9px; font-weight:900; color:var(--text3); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:5px; margin-top:14px; }
.modal input[type="text"], .modal select { width:100%; }
.modal .time-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.modal-actions { display:flex; gap:8px; margin-top:20px; }
.modal-actions .btn { flex:1; padding:13px; font-size:11px; text-align:center; letter-spacing:1px; }
.cat-badge { display:inline-flex; align-items:center; gap:7px; padding:4px 10px; border-radius:2px; border:1px solid rgba(255,255,255,0.2); font-size:10px; font-weight:900; color:#fff; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
.type-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
.type-card { padding:18px 8px; display:flex; flex-direction:column; align-items:center; gap:6px; border-radius:2px; background:var(--surface2); border:1px solid var(--border-hi); cursor:pointer; font-family:var(--font); transition:border-color 0.15s; }
.type-card:active { opacity:0.6; }
.type-card:hover { border-color:var(--accent); }
.type-card .icon { font-size:24px; }
.type-card .type-name { font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(--white); }
.type-card .type-sub { font-size:9px; color:var(--text3); font-weight:700; letter-spacing:0.5px; }

/* SHARE */
.share-link-box { background:var(--surface2); border:1px solid var(--border-hi); border-radius:2px; padding:12px; font-size:11px; font-weight:700; word-break:break-all; margin-top:8px; color:var(--text2); letter-spacing:0.3px; }

.status-bar { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--white); color:#000; padding:8px 18px; border-radius:2px; border:none; font-size:10px; font-weight:900; z-index:200; opacity:0; transition:opacity 0.2s; pointer-events:none; white-space:nowrap; text-transform:uppercase; letter-spacing:1.5px; }
.status-bar.show { opacity:1; }

.loading-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:300; gap:14px; }
.loading-screen h2 { font-size:22px; font-weight:900; color:var(--white); letter-spacing:3px; text-transform:uppercase; }
.loading-screen p { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:2px; }
.spinner { width:28px; height:28px; border:2px solid var(--border-hi); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
  <div style="font-size:32px;color:var(--accent)">✦</div>
  <h2>MI HORARIO</h2>
  <div class="spinner"></div>
  <p id="loading-msg">Cargando...</p>
</div>

<div id="app" style="display:none">
  <div class="deco-strip"></div>

  <div id="readonly-banner" class="readonly-banner" style="display:none">
    👁 Estás viendo el horario de otra persona — solo lectura
  </div>

  <header>
    <div class="header-inner">
      <div>
        <h1>Mi horario <span>✦</span></h1>
        <p class="header-sub" id="header-sub">Selecciona categoría → toca una hora</p>
      </div>
      <button class="share-btn" id="share-btn" onclick="openShareModal()">🔗 Compartir</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('schedule')">📅 Semana</button>
    <button class="tab" onclick="switchTab('month')">🗓 Mes</button>
    <button class="tab" onclick="switchTab('cats')">🎨 Categorías</button>
    <button class="tab" onclick="switchTab('permanent')">🔁 Permanentes</button>
  </div>

  <div id="tab-schedule" class="panel active">
    <p class="section-title">Categoría activa</p>
    <div class="legend-chips" id="legend-chips"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><p class="section-title" style="margin:0">Día de la semana</p><span id="week-label" style="font-size:10px;font-weight:900;color:var(--neon4);text-transform:uppercase;letter-spacing:0.5px">Esta semana</span></div>
    <div class="day-nav" id="day-nav"></div>
    <div class="schedule-wrap" id="schedule-wrap"></div>
  </div>

  <div id="tab-month" class="panel">
    <div class="month-nav">
      <button class="month-arrow" onclick="changeMonth(-1)">‹</button>
      <div class="month-title" id="month-title"></div>
      <button class="month-arrow" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div id="tab-cats" class="panel">
    <p class="section-title">Nueva categoría</p>
    <div class="add-cat-row">
      <input type="text" id="catName" placeholder="Nombre..." style="flex:1" />
      <input type="color" id="catColor" value="#ff3cac" />
      <button class="btn btn-neon1" onclick="addCategory()">+ Add</button>
    </div>
    <p class="section-title">Mis categorías</p>
    <div id="cat-list" class="perm-list"></div>
  </div>

  <div id="tab-permanent" class="panel">
    <p class="section-title">Nueva tarea permanente</p>
    <div class="perm-form">
      <div class="field"><label>Nombre</label><input type="text" id="perm-name" placeholder="ej: Meditación mañanera" /></div>
      <div class="field"><label>Categoría</label><select id="perm-cat"></select></div>
      <div class="time-row">
        <div class="field"><label>Hora inicio</label><select id="perm-start"></select></div>
        <div class="field"><label>Hora fin</label><select id="perm-end"></select></div>
      </div>
      <div class="field"><label>Días</label><div class="day-checks" id="perm-days"></div></div>
      <button class="btn btn-neon2" style="width:100%;padding:13px;font-size:13px;margin-top:6px" onclick="addPermanent()">+ Agregar tarea permanente</button>
    </div>
    <p class="section-title">Tareas guardadas</p>
    <div id="perm-list" class="perm-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalIfBg(event)">
  <div class="modal"><div class="modal-handle"></div><div id="modal-body"></div></div>
</div>
<div class="status-bar" id="status-bar"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDvPBALxUGk2tzVZ9_aoeXNFG2bjqJlW9w",
  authDomain: "mi-horario-eedd4.firebaseapp.com",
  databaseURL: "https://mi-horario-eedd4-default-rtdb.firebaseio.com",
  projectId: "mi-horario-eedd4",
  storageBucket: "mi-horario-eedd4.firebasestorage.app",
  messagingSenderId: "751665473672",
  appId: "1:751665473672:web:2796a88c064e846f0c973d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── HELPERS ──
const DAYS=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const HOURS=[];for(let h=6;h<24;h++)HOURS.push(h);

let categories=[],events={},permanents=[];
let selectedCat=null;
let currentDay=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];
let weekOffset=0;
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let myUserId=null;
let isReadOnly=false;
let saveTimeout=null;

function localDateStr(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,'0');
  const d=String(date.getDate()).padStart(2,'0');
  return`${y}-${m}-${d}`;
}
function todayStr(){return localDateStr(new Date());}
function getMondayOfCurrentWeek(){
  const today=new Date();
  const todayIdx=today.getDay()===0?6:today.getDay()-1;
  const monday=new Date(today);
  monday.setDate(today.getDate()-todayIdx+(weekOffset*7));
  monday.setHours(12,0,0,0);
  return monday;
}
function getDateForDay(dayName){
  const monday=getMondayOfCurrentWeek();
  const d=new Date(monday);
  d.setDate(monday.getDate()+DAYS.indexOf(dayName));
  return localDateStr(d);
}
function getDayNameFromDate(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  return DAYS[d.getDay()===0?6:d.getDay()-1];
}
function formatDateLabel(dateStr){
  if(!dateStr)return'';
  const[y,m,d]=dateStr.split('-');return`${d}/${m}/${y}`;
}
function genId(){return Math.random().toString(36).slice(2,10);}

// ── INIT ──
async function init(){
  setLoading('Iniciando...');

  // Check if viewing someone else's schedule
  const params=new URLSearchParams(window.location.search);
  const viewId=params.get('ver');

  if(viewId){
    // READ ONLY MODE
    isReadOnly=true;
    setLoading('Cargando horario...');
    try{
      const snap=await get(ref(db,`horarios/${viewId}`));
      if(snap.exists()){
        const data=snap.val();
        categories=data.categories||[];
        events=data.events||{};
        permanents=data.permanents||[];
        document.getElementById('readonly-banner').style.display='block';
        document.getElementById('share-btn').style.display='none';
        document.querySelector('.tabs').style.display='none';
        showApp();
        renderAll();
        // Listen for live updates
        onValue(ref(db,`horarios/${viewId}`),snap=>{
          if(snap.exists()){
            const d=snap.val();
            categories=d.categories||[];
            events=d.events||{};
            permanents=d.permanents||[];
            renderAll();
          }
        });
      }else{
        showError('No se encontró este horario.');
      }
    }catch(e){
      showError('Error al cargar el horario.');
    }
  }else{
    // OWN SCHEDULE
    myUserId=localStorage.getItem('horario_uid');
    if(!myUserId){
      myUserId=genId();
      localStorage.setItem('horario_uid',myUserId);
    }
    setLoading('Cargando tu horario...');
    try{
      const snap=await get(ref(db,`horarios/${myUserId}`));
      if(snap.exists()){
        const data=snap.val();
        categories=data.categories||[];
        events=data.events||{};
        permanents=data.permanents||[];
      }else{
        // First time — default categories
        categories=[
          {id:'c1',name:'Trabajo',color:'#7b2fff'},
          {id:'c2',name:'Estudio',color:'#00b89e'},
          {id:'c3',name:'Personal',color:'#ff3cac'},
        ];
        await saveToCloud();
      }
    }catch(e){
      // Fallback to localStorage
      try{const d=localStorage.getItem('horario_cats');if(d)categories=JSON.parse(d);}catch(e){}
      try{const d=localStorage.getItem('horario_events');if(d)events=JSON.parse(d);}catch(e){}
      try{const d=localStorage.getItem('horario_perms');if(d)permanents=JSON.parse(d);}catch(e){}
      if(categories.length===0){
        categories=[
          {id:'c1',name:'Trabajo',color:'#7b2fff'},
          {id:'c2',name:'Estudio',color:'#00b89e'},
          {id:'c3',name:'Personal',color:'#ff3cac'},
        ];
      }
    }
    buildHourSelects();buildPermDayChecks();
    showApp();renderAll();
  }
}

}

function showApp(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='block';
  if(isReadOnly){
    document.querySelectorAll('.tab')[2].style.display='none';
    document.querySelectorAll('.tab')[3].style.display='none';

    buildPermDayChecks();

function showError(msg){
  document.getElementById('loading-screen').innerHTML=`
    <div style="font-size:40px">😕</div>
    <h2 style="font-size:20px">${msg}</h2>

// ── SAVE ──
async function saveToCloud(){
  if(isReadOnly||!myUserId)return;
  try{
    await set(ref(db,`horarios/${myUserId}`),{
      categories,events,permanents,updatedAt:Date.now()
    });
    // Also save locally as backup
    localStorage.setItem('horario_cats',JSON.stringify(categories));
    localStorage.setItem('horario_events',JSON.stringify(events));
    localStorage.setItem('horario_perms',JSON.stringify(permanents));
    showStatus('✦ Guardado');
  }catch(e){
    showStatus('Sin conexión — guardado local');
    localStorage.setItem('horario_cats',JSON.stringify(categories));
    localStorage.setItem('horario_events',JSON.stringify(events));
    localStorage.setItem('horario_perms',JSON.stringify(permanents));
  }
}

function scheduleSave(){
  if(saveTimeout)clearTimeout(saveTimeout);
  saveTimeout=setTimeout(saveToCloud,800);
}

// ── SHARE ──
function openShareModal(){
  const url=`${location.origin}${location.pathname}?ver=${myUserId}`;
  showModal(`
    <h3>🔗 Compartir mi horario</h3>
    <p style="font-size:13px;color:var(--text2);font-weight:700;margin-bottom:4px">Cualquiera con este link puede ver tu horario en tiempo real:</p>
    <div class="share-link-box" id="share-link-text">${url}</div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-neon4" onclick="copyShareLink('${url}')">📋 Copiar link</button>
    </div>
    <div style="margin-top:16px;padding-top:14px;border-top:1.5px dashed var(--border)">
      <p style="font-size:11px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Ver el horario de alguien más</p>
      <div style="display:flex;gap:8px">
        <input type="text" id="view-link-input" placeholder="Pega aquí el link de tu amigo/a" style="flex:1;font-size:13px" />
        <button class="btn" onclick="openFriendLink()">Ver</button>
      </div>
    </div>
  `);
}

function copyShareLink(url){
  navigator.clipboard.writeText(url).then(()=>{
    showStatus('✦ Link copiado');
  }).catch(()=>{
    // Fallback
    const el=document.getElementById('share-link-text');
    const range=document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    showStatus('✦ Link copiado');
  });
}

function openFriendLink(){
  const input=document.getElementById('view-link-input').value.trim();
  if(!input){showStatus('★ Pega un link primero');return;}
  // Extract the ?ver= param
  try{
    const url=new URL(input);
    const ver=url.searchParams.get('ver');
    if(ver){
      window.open(`${location.origin}${location.pathname}?ver=${ver}`,'_blank');
    }else{
      showStatus('★ Link inválido');
    }
  }catch(e){
    showStatus('★ Link inválido');
  }
}

function buildHourSelects(){
  ['perm-start','perm-end'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    sel.innerHTML=HOURS.map(h=>`<option value="${h}">${h}:00</option>`).join('');

}

function buildPermDayChecks(){
  const wrap=document.getElementById('perm-days');if(!wrap)return;
  wrap.innerHTML='';
  DAYS.forEach(d=>{
    const btn=document.createElement('button');
    btn.type='button';btn.className='day-toggle active';
    btn.textContent=d.slice(0,3);btn.dataset.day=d;btn.dataset.selected='true';
    btn.addEventListener('click',function(){
      const on=this.dataset.selected==='true';
      this.dataset.selected=on?'false':'true';
      this.classList.toggle('active',!on);
    });

function updatePermCatSelect(){
  const sel=document.getElementById('perm-cat');if(!sel)return;
  sel.innerHTML=categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}

function switchTab(name){
  if(isReadOnly&&(name==='cats'||name==='permanent'))return;
  const names=['schedule','month','cats','permanent'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===name));
  names.forEach(n=>document.getElementById('tab-'+n).classList.toggle('active',n===name));
  if(name==='permanent')updatePermCatSelect();
  if(name==='month')renderCalendar();
}

// ── CATEGORIES ──
function addCategory(){

  const name=document.getElementById('catName').value.trim();
  const color=document.getElementById('catColor').value;
  if(!name)return;
  categories.push({id:'c'+Date.now(),name,color});
  document.getElementById('catName').value='';

}

function deleteCategory(id){
  if(isReadOnly)return;
  categories=categories.filter(c=>c.id!==id);
  Object.keys(events).forEach(k=>{if(events[k]?.catId===id)delete events[k];});

  if(selectedCat===id)selectedCat=null;

}

function selectCat(id){

}

// ── RENDER ──
function renderChips(){

  wrap.innerHTML='';
  categories.forEach(c=>{
    const chip=document.createElement('div');
    chip.className='chip'+(selectedCat===c.id?' selected':'');

    if(!isReadOnly)chip.onclick=()=>selectCat(c.id);
    wrap.appendChild(chip);
  });
}

function renderDayNav(){
  const wrap=document.getElementById('day-nav');if(!wrap)return;
  wrap.innerHTML='';
  const today=todayStr();
  const monday=getMondayOfCurrentWeek();
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);

  const prevBtn=document.createElement('button');
  prevBtn.className='day-btn';prevBtn.style.padding='6px 10px';prevBtn.style.fontSize='18px';
  prevBtn.textContent='‹';
  prevBtn.onclick=()=>{weekOffset--;currentDay=DAYS[0];renderDayNav();renderSchedule();};
  wrap.appendChild(prevBtn);

  DAYS.forEach(d=>{
    const date=getDateForDay(d);
    const isToday=date===today;
    const btn=document.createElement('button');
    btn.className='day-btn'+(d===currentDay?' active':'');
    btn.innerHTML=`<span style="display:block">${d.slice(0,3).toUpperCase()}</span><span style="display:block;opacity:0.65;margin-top:1px">${date.slice(8,10)}${isToday?' ★':''}</span>`;
    btn.onclick=()=>{currentDay=d;renderDayNav();renderSchedule();};
    wrap.appendChild(btn);
  });

  const nextBtn=document.createElement('button');
  nextBtn.className='day-btn';nextBtn.style.padding='6px 10px';nextBtn.style.fontSize='18px';
  nextBtn.textContent='›';
  nextBtn.onclick=()=>{weekOffset++;currentDay=DAYS[0];renderDayNav();renderSchedule();};
  wrap.appendChild(nextBtn);

  const weekLabel=document.getElementById('week-label');
  if(weekLabel){
    if(weekOffset===0)weekLabel.textContent='Esta semana';
    else if(weekOffset===1)weekLabel.textContent='Próxima semana';
    else if(weekOffset===-1)weekLabel.textContent='Semana pasada';
    else weekLabel.textContent=`${localDateStr(monday).slice(8,10)}/${String(monday.getMonth()+1).padStart(2,'0')} – ${localDateStr(sunday).slice(8,10)}/${String(sunday.getMonth()+1).padStart(2,'0')}`;
  }
}

function getPermForCell(day,hour){
  return permanents.find(p=>p.days.includes(day)&&hour>=p.startH&&hour<p.endH)||null;
}

function renderSchedule(){
  const wrap=document.getElementById('schedule-wrap');if(!wrap)return;
  wrap.innerHTML='';
  const viewDate=getDateForDay(currentDay);
  HOURS.forEach(h=>{
    const row=document.createElement('div');row.className='schedule-row';
    const tc=document.createElement('div');tc.className='time-col';tc.textContent=h+':00';
    row.appendChild(tc);
    const key=currentDay+'_'+h;
    const perm=getPermForCell(currentDay,h);
    const ev=events[key];
    const evVisible=ev&&ev.date===viewDate;
    const ec=document.createElement('div');ec.className='event-col';
    if(perm){
      const cat=categories.find(c=>c.id===perm.catId);
      if(cat){
        const block=document.createElement('div');block.className='event-block';
        block.style.background=cat.color+'22';block.style.color=cat.color;
        block.style.borderColor=cat.color+'70';block.style.borderStyle='dashed';
        block.innerHTML=`<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${perm.name}</span><span class="perm-dot" style="background:${cat.color}"></span>`;
        if(!isReadOnly)block.onclick=()=>openPermDetail(perm);
        ec.appendChild(block);ec.style.cursor=isReadOnly?'default':'pointer';
      }
    }else if(evVisible){
      const cat=categories.find(c=>c.id===ev.catId);
      if(cat){
        const block=document.createElement('div');block.className='event-block';
        block.style.background=cat.color;block.style.color='#fff';block.style.borderColor=cat.color;
        block.innerHTML=`<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.label||cat.name}</span><span style="font-size:9px;background:rgba(255,255,255,0.25);padding:1px 5px;border-radius:10px;flex-shrink:0;margin-left:5px;font-weight:900">HOY</span>`;
        if(!isReadOnly)block.onclick=()=>openEditEvent(key,ev,cat);
        ec.appendChild(block);
      }
    }else if(!isReadOnly){
      ec.onclick=()=>cellClick(key,viewDate);
    }
    row.appendChild(ec);wrap.appendChild(row);
  });
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function hasActivityOnDate(dateStr){
  const dayName=getDayNameFromDate(dateStr);
  const colors=new Set();
  HOURS.forEach(h=>{
    const perm=getPermForCell(dayName,h);
    if(perm){const cat=categories.find(c=>c.id===perm.catId);if(cat)colors.add(cat.color);}
    const ev=events[dayName+'_'+h];
    if(ev&&ev.date===dateStr){const cat=categories.find(c=>c.id===ev.catId);if(cat)colors.add(cat.color);}
  });
  return[...colors];
}

function renderCalendar(){
  const titleEl=document.getElementById('month-title');
  const grid=document.getElementById('cal-grid');
  if(!titleEl||!grid)return;
  titleEl.textContent=`${MONTHS[calMonth]} ${calYear}`;
  grid.innerHTML='';
  ['Lu','Ma','Mi','Ju','Vi','Sá','Do'].forEach(d=>{
    const el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);
  });
  const firstDay=new Date(calYear,calMonth,1);
  const startOffset=firstDay.getDay()===0?6:firstDay.getDay()-1;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=todayStr();
  for(let i=0;i<startOffset;i++){
    const el=document.createElement('div');el.className='cal-day empty';grid.appendChild(el);
  }
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===today;
    const colors=hasActivityOnDate(dateStr);
    const hasAct=colors.length>0;
    const el=document.createElement('div');
    let cls='cal-day';
    if(isToday)cls+=' today';
    if(hasAct)cls+=' has-activity';
    el.className=cls;
    // If has activity and not today, tint background with first color
    if(hasAct&&!isToday){
      el.style.background=colors[0]+'18';
      el.style.borderColor=colors[0]+'90';
    }
    const dotsHtml=colors.slice(0,6).map(c=>`<span class="cal-dot" style="background:${c}"></span>`).join('');
    el.innerHTML=`<div class="cal-day-num">${d}</div><div class="cal-dots">${dotsHtml}</div>`;
    el.onclick=()=>openDayFromCalendar(dateStr);
    grid.appendChild(el);
  }
}

function openDayFromCalendar(dateStr){
  const dayName=getDayNameFromDate(dateStr);
  // Calculate weekOffset for this date
  const clickedDate=new Date(dateStr+'T12:00:00');
  const todayDate=new Date();
  const todayIdx=todayDate.getDay()===0?6:todayDate.getDay()-1;
  const thisMonday=new Date(todayDate);
  thisMonday.setDate(todayDate.getDate()-todayIdx);
  thisMonday.setHours(12,0,0,0);
  const clickedIdx=clickedDate.getDay()===0?6:clickedDate.getDay()-1;
  const clickedMonday=new Date(clickedDate);
  clickedMonday.setDate(clickedDate.getDate()-clickedIdx);
  const diffMs=clickedMonday-thisMonday;
  weekOffset=Math.round(diffMs/(7*24*60*60*1000));
  currentDay=dayName;
  switchTab('schedule');
  renderDayNav();renderSchedule();
  showStatus(`★ ${dayName} ${formatDateLabel(dateStr)}`);
}

function renderCatList(){
  const list=document.getElementById('cat-list');if(!list)return;
  if(categories.length===0){list.innerHTML='<div class="empty-state">No hay categorías aún.</div>';return;}
  list.innerHTML='';
  categories.forEach(c=>{

    item.innerHTML=`<span class="perm-color" style="background:${c.color}"></span><div class="perm-info"><div class="perm-name" style="color:${c.color}">${c.name}</div></div><button class="btn btn-danger" onclick="confirmDeleteCat('${c.id}')">Eliminar</button>`;
    list.appendChild(item);
  });
}

function renderPermList(){
  const list=document.getElementById('perm-list');if(!list)return;
  if(permanents.length===0){list.innerHTML='<div class="empty-state">No hay tareas permanentes aún.</div>';return;}
  list.innerHTML='';
  permanents.forEach(p=>{
    const cat=categories.find(c=>c.id===p.catId);if(!cat)return;
    const daysStr=p.days.length===7?'Todos los días':p.days.map(d=>d.slice(0,3)).join(', ');
    const item=document.createElement('div');item.className='perm-item';
    item.style.borderLeft=`5px solid ${cat.color}`;
    item.innerHTML=`<span class="perm-color" style="background:${cat.color}"></span><div class="perm-info"><div class="perm-name">${p.name}</div><div class="perm-meta">${cat.name} · ${p.startH}:00–${p.endH}:00 · ${daysStr}</div></div><button class="btn btn-danger" onclick="deletePermanent('${p.id}')">✕</button>`;
    list.appendChild(item);
  });
}

function renderAll(){
  renderChips();renderDayNav();renderSchedule();renderCatList();renderPermList();updateHeaderSub();
}

  const daysHtml=DAYS.map(d=>`<button type="button" class="day-toggle${d===day?' active':''}" data-day="${d}" data-selected="${d===day?'true':'false'}" onclick="this.dataset.selected=this.dataset.selected==='true'?'false':'true';this.classList.toggle('active',this.dataset.selected==='true')">${d.slice(0,3)}</button>`).join('');

    <h3>Evento permanente</h3>

function savePermFromModal(catId){
  const name=document.getElementById('perm-modal-name')?.value.trim();
  const startH=parseInt(document.getElementById('perm-modal-start').value);
  const endH=parseInt(document.getElementById('perm-modal-end').value);
  const days=[...document.querySelectorAll('#perm-modal-days .day-toggle')].filter(b=>b.dataset.selected==='true').map(b=>b.dataset.day);
  if(!name){showStatus('★ Escribe un nombre');return;}
  if(endH<=startH){showStatus('★ La hora fin debe ser mayor');return;}
  if(days.length===0){showStatus('★ Elige al menos un día');return;}
  permanents.push({id:'p'+Date.now(),name,catId,startH,endH,days});
  closeModal();renderAll();scheduleSave();
}

    </div>
  `);

function saveEditEvent(key,date){
  const catId=document.getElementById('ev-cat').value;
  const label=document.getElementById('ev-label')?.value.trim()||'';
  events[key]={catId,label,date};
  closeModal();renderSchedule();renderCalendar();scheduleSave();
}

function deleteEvent(key){
  delete events[key];closeModal();renderSchedule();renderCalendar();scheduleSave();
}

function addPermanent(){
  if(isReadOnly)return;
  const name=document.getElementById('perm-name').value.trim();
  const catId=document.getElementById('perm-cat').value;
  const startH=parseInt(document.getElementById('perm-start').value);
  const endH=parseInt(document.getElementById('perm-end').value);
  const days=[...document.querySelectorAll('#perm-days .day-toggle')].filter(b=>b.dataset.selected==='true').map(b=>b.dataset.day);
  if(!name){showStatus('★ Escribe un nombre');return;}
  if(!catId){showStatus('★ Elige una categoría');return;}
  if(endH<=startH){showStatus('★ La hora fin debe ser mayor');return;}
  if(days.length===0){showStatus('★ Elige al menos un día');return;}
  permanents.push({id:'p'+Date.now(),name,catId,startH,endH,days});
  document.getElementById('perm-name').value='';
  renderAll();scheduleSave();
}

function deletePermanent(id){
  if(isReadOnly)return;
  permanents=permanents.filter(p=>p.id!==id);renderAll();scheduleSave();
}

function openPermDetail(perm){
  const cat=categories.find(c=>c.id===perm.catId);
  const daysStr=perm.days.length===7?'Todos los días':perm.days.join(', ');
  showModal(`
    <h3>${perm.name}</h3>
    <div class="cat-badge" style="background:${cat?.color||'#888'}">${cat?.name||'—'}</div>
    <div style="font-size:13px;color:var(--text2);font-weight:700;line-height:2.4;margin-top:10px">
      <div>Horario: <strong style="color:var(--text)">${perm.startH}:00 – ${perm.endH}:00</strong></div>
      <div>Días: <strong style="color:var(--text)">${daysStr}</strong></div>
    </div>
    <div class="modal-actions">
      ${!isReadOnly?`<button class="btn btn-danger" onclick="deletePermanent('${perm.id}');closeModal()">Eliminar</button>`:''}
      <button class="btn btn-outline" onclick="closeModal()">Cerrar</button>
    </div>
  `);
}

function confirmDeleteCat(id){
  const cat=categories.find(c=>c.id===id);
  showModal(`
    <h3>¿Eliminar categoría?</h3>
    <p style="font-size:14px;color:var(--text2);font-weight:700;margin-bottom:4px">Se borrará <strong style="color:${cat?.color}">${cat?.name}</strong> y todas sus actividades.</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn" style="background:#e03;border-color:#e03" onclick="deleteCategory('${id}')">Eliminar</button>
    </div>
  `);
}

function showModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalIfBg(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

// Make functions global for onclick handlers
window.switchTab=switchTab;window.addCategory=addCategory;window.selectCat=selectCat;window.changeWeek=(d)=>{weekOffset+=d;currentDay=DAYS[0];renderDayNav();renderSchedule();};
window.changeMonth=changeMonth;window.addPermanent=addPermanent;window.deletePermanent=deletePermanent;
window.deleteCategory=deleteCategory;window.confirmDeleteCat=confirmDeleteCat;
window.openShareModal=openShareModal;window.copyShareLink=copyShareLink;window.openFriendLink=openFriendLink;
window.cellClick=cellClick;window.openTypeChooser=openTypeChooser;
window.openNewTempEvent=openNewTempEvent;window.saveTempEvent=saveTempEvent;
window.openNewPermFromCell=openNewPermFromCell;window.savePermFromModal=savePermFromModal;
window.openEditEvent=openEditEvent;window.saveEditEvent=saveEditEvent;window.deleteEvent=deleteEvent;
window.openPermDetail=openPermDetail;window.closeModal=closeModal;window.closeModalIfBg=closeModalIfBg;

init();
</script>
</body>
</html>

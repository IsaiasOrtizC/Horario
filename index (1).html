<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Mi Horario" />
<title>Mi Horario Semanal</title>
<style>
:root {
  --bg: #fff9f0;
  --surface: #ffffff;
  --surface2: #fff3e0;
  --border: #1a1a1a;
  --text: #1a1a1a;
  --text2: #555;
  --text3: #999;
  --shadow: 3px 3px 0 #1a1a1a;
  --shadow-sm: 2px 2px 0 #1a1a1a;
  --radius: 10px;
  --radius-lg: 14px;
  --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', system-ui, sans-serif;
  --neon1: #ff3cac; --neon2: #00d4b8; --neon3: #ffe600; --neon4: #7b2fff; --neon5: #ff6b2b; --neon6: #00cfff;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141412; --surface: #1e1e1b; --surface2: #28271f;
    --border: #d0d0c0; --text: #f0efe8; --text2: #9e9e97; --text3: #6b6b65;
    --shadow: 3px 3px 0 #ffffff22; --shadow-sm: 2px 2px 0 #ffffff22;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; max-width: 600px; margin: 0 auto; }

.deco-strip { height: 6px; background: repeating-linear-gradient(90deg,#ff3cac 0 20px,#ffe600 20px 40px,#00d4b8 40px 60px,#7b2fff 60px 80px,#ff6b2b 80px 100px,#00cfff 100px 120px); border-bottom: 2px solid var(--border); }

header { padding: 14px 16px 10px; background: var(--neon3); border-bottom: 3px solid var(--border); position: sticky; top: 0; z-index: 20; }
header h1 { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; line-height: 1; }
header h1 span { display:inline-block; background:var(--neon1); color:#fff; padding:1px 8px; border-radius:6px; border:2px solid var(--border); margin-left:4px; font-size:18px; }
.header-sub { font-size:10px; font-weight:700; color:var(--text2); margin-top:3px; letter-spacing:0.4px; text-transform:uppercase; }

.tabs { display:flex; background:var(--surface); border-bottom:3px solid var(--border); position:sticky; top:63px; z-index:19; }
.tab { flex:1; padding:10px 2px; font-size:10px; font-family:var(--font); font-weight:900; color:var(--text2); background:none; border:none; border-bottom:4px solid transparent; cursor:pointer; text-transform:uppercase; letter-spacing:0.3px; transition:all 0.15s; }
.tab:nth-child(1).active { border-bottom-color:var(--neon1); color:var(--neon1); background:#ff3cac0d; }
.tab:nth-child(2).active { border-bottom-color:var(--neon6); color:var(--neon6); background:#00cfff0d; }
.tab:nth-child(3).active { border-bottom-color:var(--neon4); color:var(--neon4); background:#7b2fff0d; }
.tab:nth-child(4).active { border-bottom-color:var(--neon2); color:var(--neon2); background:#00d4b80d; }

.panel { display:none; padding:16px; }
.panel.active { display:block; }
.section-title { font-size:10px; font-weight:900; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; margin-top:18px; }
.section-title:first-child { margin-top:0; }

input[type="text"], select { font-family:var(--font); font-size:14px; font-weight:700; color:var(--text); background:var(--surface); border:2.5px solid var(--border); border-radius:var(--radius); padding:9px 12px; outline:none; box-shadow:var(--shadow-sm); -webkit-appearance:none; transition:box-shadow 0.1s; }
input[type="text"]:focus, select:focus { box-shadow:4px 4px 0 var(--neon4); border-color:var(--neon4); }
input[type="color"] { width:42px; height:42px; border:2.5px solid var(--border); border-radius:var(--radius); padding:2px; background:var(--surface); cursor:pointer; box-shadow:var(--shadow-sm); }

.btn { padding:9px 16px; font-family:var(--font); font-size:13px; font-weight:900; background:var(--text); color:var(--bg); border:2.5px solid var(--border); border-radius:var(--radius); cursor:pointer; white-space:nowrap; box-shadow:var(--shadow-sm); text-transform:uppercase; letter-spacing:0.5px; transition:transform 0.1s, box-shadow 0.1s; }
.btn:active { transform:translate(2px,2px); box-shadow:none; }
.btn-outline { background:var(--surface); color:var(--text); }
.btn-neon1 { background:var(--neon1); color:#fff; }
.btn-neon2 { background:var(--neon2); color:var(--text); }
.btn-neon4 { background:var(--neon4); color:#fff; }
.btn-danger { background:var(--surface); color:#e03; border:2.5px solid #e03; box-shadow:2px 2px 0 #e0330033; }

.legend-chips { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; }
.chip { display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:30px; border:2.5px solid var(--border); background:var(--surface); font-size:12px; font-weight:900; cursor:pointer; box-shadow:var(--shadow-sm); transition:transform 0.1s, box-shadow 0.1s; user-select:none; -webkit-user-select:none; text-transform:uppercase; letter-spacing:0.3px; }
.chip:active { transform:translate(2px,2px); box-shadow:none; }
.chip.selected { color:#fff !important; }
.chip-dot { width:9px; height:9px; border-radius:50%; border:1.5px solid rgba(0,0,0,0.15); flex-shrink:0; }

.day-nav { display:flex; gap:7px; overflow-x:auto; padding-bottom:6px; margin-bottom:14px; scrollbar-width:none; }
.day-nav::-webkit-scrollbar { display:none; }
.day-btn { flex-shrink:0; padding:6px 10px; border-radius:30px; border:2.5px solid var(--border); background:var(--surface); font-family:var(--font); font-size:11px; font-weight:900; color:var(--text2); cursor:pointer; box-shadow:var(--shadow-sm); text-transform:uppercase; letter-spacing:0.4px; transition:transform 0.1s, box-shadow 0.1s; text-align:center; }
.day-btn:active { transform:translate(2px,2px); box-shadow:none; }
.day-btn.active { background:var(--neon3); color:var(--text); border-color:var(--border); }

.schedule-wrap { background:var(--surface); border-radius:var(--radius-lg); overflow:hidden; border:2.5px solid var(--border); box-shadow:var(--shadow); }
.schedule-row { display:flex; align-items:stretch; border-bottom:1px solid #e0e0d0; min-height:46px; }
.schedule-row:last-child { border-bottom:none; }
.schedule-row:nth-child(even) { background:var(--surface2); }
.time-col { width:50px; flex-shrink:0; display:flex; align-items:center; justify-content:flex-end; padding:0 8px 0 0; font-size:10px; font-weight:900; color:var(--text3); border-right:2px solid #e0e0d0; text-transform:uppercase; letter-spacing:0.3px; }
.event-col { flex:1; padding:4px 6px; display:flex; align-items:center; cursor:pointer; min-height:46px; transition:background 0.1s; }
.event-col:active { background:var(--surface2); }
.event-block { width:100%; padding:7px 10px; border-radius:8px; border:2px solid var(--border); font-size:12px; font-weight:900; display:flex; align-items:center; justify-content:space-between; box-shadow:2px 2px 0 rgba(0,0,0,0.1); text-transform:uppercase; letter-spacing:0.3px; }
.perm-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-left:6px; }

/* CALENDAR */
.month-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.month-title { font-size:17px; font-weight:900; text-transform:uppercase; letter-spacing:0.5px; }
.month-arrow { width:36px; height:36px; border-radius:50%; border:2.5px solid var(--border); background:var(--surface); font-size:18px; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-sm); transition:transform 0.1s, box-shadow 0.1s; font-family:var(--font); }
.month-arrow:active { transform:translate(2px,2px); box-shadow:none; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-dow { font-size:9px; font-weight:900; color:var(--text3); text-align:center; text-transform:uppercase; letter-spacing:0.5px; padding:4px 0 6px; }
.cal-day { min-height:50px; border-radius:var(--radius); border:2px solid var(--border); background:var(--surface); padding:5px 3px 4px; cursor:pointer; box-shadow:var(--shadow-sm); transition:transform 0.1s, box-shadow 0.1s; }
.cal-day:active { transform:translate(2px,2px); box-shadow:none; }
.cal-day.empty { border-color:transparent; background:transparent; box-shadow:none; cursor:default; }
.cal-day.today { background:var(--neon3); }
.cal-day-num { font-size:11px; font-weight:900; text-align:center; margin-bottom:4px; }
.cal-dots { display:flex; flex-wrap:wrap; gap:2px; justify-content:center; }
.cal-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* PERM FORM */
.perm-form { background:var(--surface); border-radius:var(--radius-lg); padding:16px; margin-bottom:16px; border:2.5px solid var(--border); box-shadow:var(--shadow); }
.field { margin-bottom:12px; }
.field label { display:block; font-size:10px; font-weight:900; color:var(--text3); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:5px; }
.field input[type="text"], .field select { width:100%; }
.time-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.day-checks { display:flex; flex-wrap:wrap; gap:6px; }
.day-toggle { display:inline-flex; align-items:center; padding:6px 10px; border-radius:30px; border:2.5px solid var(--border); background:var(--surface); font-family:var(--font); font-size:11px; font-weight:900; color:var(--text2); cursor:pointer; box-shadow:var(--shadow-sm); text-transform:uppercase; letter-spacing:0.3px; transition:transform 0.1s, box-shadow 0.1s; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
.day-toggle:active { transform:translate(2px,2px); box-shadow:none; }
.day-toggle.active { background:var(--neon2); color:var(--text); }

.perm-list { display:flex; flex-direction:column; gap:8px; }
.perm-item { background:var(--surface); border-radius:var(--radius-lg); border:2.5px solid var(--border); padding:12px 14px; display:flex; align-items:center; gap:10px; box-shadow:var(--shadow-sm); }
.perm-color { width:14px; height:14px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; }
.perm-info { flex:1; min-width:0; }
.perm-name { font-size:13px; font-weight:900; text-transform:uppercase; letter-spacing:0.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.perm-meta { font-size:11px; color:var(--text2); font-weight:700; margin-top:2px; }
.empty-state { text-align:center; padding:28px 16px; color:var(--text3); font-size:13px; font-weight:700; background:var(--surface); border-radius:var(--radius-lg); border:2.5px dashed var(--border); }
.add-cat-row { display:flex; gap:8px; align-items:center; margin-bottom:6px; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:20px 20px 0 0; border-top:3px solid var(--border); border-left:3px solid var(--border); border-right:3px solid var(--border); padding:20px 20px 44px; width:100%; max-width:600px; max-height:88vh; overflow-y:auto; }
.modal-handle { width:40px; height:5px; border-radius:3px; background:#ddd; margin:0 auto 18px; }
.modal h3 { font-size:20px; font-weight:900; margin-bottom:12px; }
.modal label { display:block; font-size:10px; font-weight:900; color:var(--text3); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:5px; margin-top:14px; }
.modal input[type="text"], .modal select { width:100%; }
.modal .time-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.modal-actions { display:flex; gap:8px; margin-top:20px; }
.modal-actions .btn { flex:1; padding:13px; font-size:13px; text-align:center; }
.cat-badge { display:inline-flex; align-items:center; gap:7px; padding:6px 12px; border-radius:30px; border:2px solid var(--border); font-size:12px; font-weight:900; color:#fff; margin-bottom:6px; text-transform:uppercase; }
.type-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px; }
.type-card { padding:16px 8px; display:flex; flex-direction:column; align-items:center; gap:5px; border-radius:12px; background:var(--surface); border:2.5px solid var(--border); box-shadow:var(--shadow-sm); cursor:pointer; font-family:var(--font); transition:transform 0.1s, box-shadow 0.1s; }
.type-card:active { transform:translate(2px,2px); box-shadow:none; }
.type-card .icon { font-size:26px; }
.type-card .type-name { font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:0.5px; color:var(--text); }
.type-card .type-sub { font-size:10px; color:var(--text3); font-weight:700; }

.status-bar { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--neon3); padding:9px 18px; border-radius:30px; border:2.5px solid var(--border); font-size:12px; font-weight:900; z-index:200; opacity:0; transition:opacity 0.2s; pointer-events:none; white-space:nowrap; box-shadow:var(--shadow); text-transform:uppercase; letter-spacing:0.5px; }
.status-bar.show { opacity:1; }
</style>
</head>
<body>
<div class="deco-strip"></div>
<header>
  <h1>Mi horario <span>✦</span></h1>
  <p class="header-sub" id="header-sub">Selecciona categoría → toca una hora</p>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('schedule')">📅 Semana</button>
  <button class="tab" onclick="switchTab('month')">🗓 Mes</button>
  <button class="tab" onclick="switchTab('cats')">🎨 Categorías</button>
  <button class="tab" onclick="switchTab('permanent')">🔁 Permanentes</button>
</div>

<div id="tab-schedule" class="panel active">
  <p class="section-title">Categoría activa</p>
  <div class="legend-chips" id="legend-chips"></div>
  <p class="section-title">Día de la semana</p>
  <div class="day-nav" id="day-nav"></div>
  <div class="schedule-wrap" id="schedule-wrap"></div>
</div>

<div id="tab-month" class="panel">
  <div class="month-nav">
    <button class="month-arrow" onclick="changeMonth(-1)">‹</button>
    <div class="month-title" id="month-title"></div>
    <button class="month-arrow" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div id="tab-cats" class="panel">
  <p class="section-title">Nueva categoría</p>
  <div class="add-cat-row">
    <input type="text" id="catName" placeholder="Nombre..." style="flex:1" />
    <input type="color" id="catColor" value="#ff3cac" />
    <button class="btn btn-neon1" onclick="addCategory()">+ Add</button>
  </div>
  <p class="section-title">Mis categorías</p>
  <div id="cat-list" class="perm-list"></div>
</div>

<div id="tab-permanent" class="panel">
  <p class="section-title">Nueva tarea permanente</p>
  <div class="perm-form">
    <div class="field"><label>Nombre</label><input type="text" id="perm-name" placeholder="ej: Meditación mañanera" /></div>
    <div class="field"><label>Categoría</label><select id="perm-cat"></select></div>
    <div class="time-row">
      <div class="field"><label>Hora inicio</label><select id="perm-start"></select></div>
      <div class="field"><label>Hora fin</label><select id="perm-end"></select></div>
    </div>
    <div class="field"><label>Días</label><div class="day-checks" id="perm-days"></div></div>
    <button class="btn btn-neon2" style="width:100%;padding:13px;font-size:13px;margin-top:6px" onclick="addPermanent()">+ Agregar tarea permanente</button>
  </div>
  <p class="section-title">Tareas guardadas</p>
  <div id="perm-list" class="perm-list"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalIfBg(event)">
  <div class="modal"><div class="modal-handle"></div><div id="modal-body"></div></div>
</div>
<div class="status-bar" id="status-bar"></div>

<script>
const DAYS=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const HOURS=[];for(let h=6;h<24;h++)HOURS.push(h);

let categories=[],events={},permanents=[];
let selectedCat=null;
let currentDay=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();

function todayStr(){return new Date().toISOString().slice(0,10);}

function getDateForDay(dayName){
  const today=new Date();
  const todayIdx=today.getDay()===0?6:today.getDay()-1;
  const diff=DAYS.indexOf(dayName)-todayIdx;
  const d=new Date(today);d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}

function getDayNameFromDate(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  return DAYS[d.getDay()===0?6:d.getDay()-1];
}

function formatDateLabel(dateStr){
  if(!dateStr)return'';
  const[y,m,d]=dateStr.split('-');return`${d}/${m}/${y}`;
}

function load(){
  try{const d=localStorage.getItem('horario_cats');if(d)categories=JSON.parse(d);}catch(e){}
  try{const d=localStorage.getItem('horario_events');if(d)events=JSON.parse(d);}catch(e){}
  try{const d=localStorage.getItem('horario_perms');if(d)permanents=JSON.parse(d);}catch(e){}
  if(categories.length===0){
    categories=[
      {id:'c1',name:'Trabajo',color:'#7b2fff'},
      {id:'c2',name:'Estudio',color:'#00b89e'},
      {id:'c3',name:'Personal',color:'#ff3cac'},
    ];
  }
  buildHourSelects();buildPermDayChecks();renderAll();
}

function save(){
  try{
    localStorage.setItem('horario_cats',JSON.stringify(categories));
    localStorage.setItem('horario_events',JSON.stringify(events));
    localStorage.setItem('horario_perms',JSON.stringify(permanents));
    showStatus('✦ Guardado');
  }catch(e){showStatus('Error al guardar');}
}

function showStatus(msg){
  const el=document.getElementById('status-bar');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1800);
}

function buildHourSelects(){
  ['perm-start','perm-end'].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML=HOURS.map(h=>`<option value="${h}">${h}:00</option>`).join('');
  });
  document.getElementById('perm-end').value=7;
}

function buildPermDayChecks(){
  const wrap=document.getElementById('perm-days');
  wrap.innerHTML='';
  DAYS.forEach(d=>{
    const btn=document.createElement('button');
    btn.type='button';btn.className='day-toggle active';
    btn.textContent=d.slice(0,3);btn.dataset.day=d;btn.dataset.selected='true';
    btn.addEventListener('click',function(){
      const on=this.dataset.selected==='true';
      this.dataset.selected=on?'false':'true';
      this.classList.toggle('active',!on);
    });
    wrap.appendChild(btn);
  });
}

function updatePermCatSelect(){
  document.getElementById('perm-cat').innerHTML=
    categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}

function switchTab(name){
  const names=['schedule','month','cats','permanent'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===name));
  names.forEach(n=>document.getElementById('tab-'+n).classList.toggle('active',n===name));
  if(name==='permanent')updatePermCatSelect();
  if(name==='month')renderCalendar();
}

function addCategory(){
  const name=document.getElementById('catName').value.trim();
  const color=document.getElementById('catColor').value;
  if(!name)return;
  categories.push({id:'c'+Date.now(),name,color});
  document.getElementById('catName').value='';
  renderAll();save();
}

function deleteCategory(id){
  categories=categories.filter(c=>c.id!==id);
  Object.keys(events).forEach(k=>{if(events[k]?.catId===id)delete events[k];});
  permanents=permanents.filter(p=>p.catId!==id);
  if(selectedCat===id)selectedCat=null;
  renderAll();save();closeModal();
}

function selectCat(id){
  selectedCat=(selectedCat===id)?null:id;
  renderChips();updateHeaderSub();
}

function updateHeaderSub(){
  const el=document.getElementById('header-sub');
  if(selectedCat){
    const cat=categories.find(c=>c.id===selectedCat);
    el.textContent=cat?`★ ${cat.name.toUpperCase()} activa · toca una hora`:'';
  }else{
    el.textContent='Selecciona categoría → toca una hora';
  }
}

function renderChips(){
  const wrap=document.getElementById('legend-chips');
  wrap.innerHTML='';
  categories.forEach(c=>{
    const chip=document.createElement('div');
    chip.className='chip'+(selectedCat===c.id?' selected':'');
    chip.style.background=selectedCat===c.id?c.color:'';
    chip.style.borderColor=selectedCat===c.id?c.color:'';
    chip.innerHTML=`<span class="chip-dot" style="background:${c.color}"></span>${c.name}`;
    chip.onclick=()=>selectCat(c.id);
    wrap.appendChild(chip);
  });
}

function renderDayNav(){
  const wrap=document.getElementById('day-nav');
  wrap.innerHTML='';
  const today=todayStr();
  DAYS.forEach(d=>{
    const date=getDateForDay(d);
    const isToday=date===today;
    const btn=document.createElement('button');
    btn.className='day-btn'+(d===currentDay?' active':'');
    btn.innerHTML=`<span style="display:block">${d.slice(0,3).toUpperCase()}</span><span style="display:block;opacity:0.65;margin-top:1px">${date.slice(8,10)}${isToday?' ★':''}</span>`;
    btn.onclick=()=>{currentDay=d;renderDayNav();renderSchedule();};
    wrap.appendChild(btn);
  });
}

function getPermForCell(day,hour){
  return permanents.find(p=>p.days.includes(day)&&hour>=p.startH&&hour<p.endH)||null;
}

function renderSchedule(){
  const wrap=document.getElementById('schedule-wrap');
  wrap.innerHTML='';
  const viewDate=getDateForDay(currentDay);
  HOURS.forEach(h=>{
    const row=document.createElement('div');
    row.className='schedule-row';
    const tc=document.createElement('div');
    tc.className='time-col';tc.textContent=h+':00';
    row.appendChild(tc);
    const key=currentDay+'_'+h;
    const perm=getPermForCell(currentDay,h);
    const ev=events[key];
    const evVisible=ev&&ev.date===viewDate;
    const ec=document.createElement('div');
    ec.className='event-col';
    if(perm){
      const cat=categories.find(c=>c.id===perm.catId);
      if(cat){
        const block=document.createElement('div');
        block.className='event-block';
        block.style.background=cat.color+'22';
        block.style.color=cat.color;
        block.style.borderColor=cat.color+'70';
        block.style.borderStyle='dashed';
        block.innerHTML=`<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${perm.name}</span><span class="perm-dot" style="background:${cat.color}"></span>`;
        block.onclick=()=>openPermDetail(perm);
        ec.appendChild(block);ec.style.cursor='default';
      }
    }else if(evVisible){
      const cat=categories.find(c=>c.id===ev.catId);
      if(cat){
        const block=document.createElement('div');
        block.className='event-block';
        block.style.background=cat.color;
        block.style.color='#fff';
        block.style.borderColor=cat.color;
        block.innerHTML=`<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.label||cat.name}</span><span style="font-size:9px;background:rgba(255,255,255,0.25);padding:1px 5px;border-radius:10px;flex-shrink:0;margin-left:5px;font-weight:900">HOY</span>`;
        block.onclick=()=>openEditEvent(key,ev,cat);
        ec.appendChild(block);
        ec.onclick=(e)=>{if(e.target===ec)openEditEvent(key,ev,cat);};
      }
    }else{
      ec.onclick=()=>cellClick(key,viewDate);
    }
    row.appendChild(ec);wrap.appendChild(row);
  });
}

/* ── CALENDAR ── */
function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function hasActivityOnDate(dateStr){
  const dayName=getDayNameFromDate(dateStr);
  const colors=new Set();
  HOURS.forEach(h=>{
    const perm=getPermForCell(dayName,h);
    if(perm){const cat=categories.find(c=>c.id===perm.catId);if(cat)colors.add(cat.color);}
    const ev=events[dayName+'_'+h];
    if(ev&&ev.date===dateStr){const cat=categories.find(c=>c.id===ev.catId);if(cat)colors.add(cat.color);}
  });
  return[...colors];
}

function renderCalendar(){
  document.getElementById('month-title').textContent=`${MONTHS[calMonth]} ${calYear}`;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  ['Lu','Ma','Mi','Ju','Vi','Sá','Do'].forEach(d=>{
    const el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);
  });
  const firstDay=new Date(calYear,calMonth,1);
  const startOffset=firstDay.getDay()===0?6:firstDay.getDay()-1;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=todayStr();
  for(let i=0;i<startOffset;i++){
    const el=document.createElement('div');el.className='cal-day empty';grid.appendChild(el);
  }
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===today;
    const el=document.createElement('div');
    el.className='cal-day'+(isToday?' today':'');
    const colors=hasActivityOnDate(dateStr);
    el.innerHTML=`<div class="cal-day-num">${d}</div><div class="cal-dots">${colors.slice(0,5).map(c=>`<span class="cal-dot" style="background:${c}"></span>`).join('')}</div>`;
    el.onclick=()=>openDayFromCalendar(dateStr);
    grid.appendChild(el);
  }
}

function openDayFromCalendar(dateStr){
  const dayName=getDayNameFromDate(dateStr);
  currentDay=dayName;
  switchTab('schedule');
  renderDayNav();renderSchedule();
  showStatus(`★ ${dayName} ${formatDateLabel(dateStr)}`);
}

function renderCatList(){
  const list=document.getElementById('cat-list');
  if(categories.length===0){list.innerHTML='<div class="empty-state">No hay categorías aún.</div>';return;}
  list.innerHTML='';
  categories.forEach(c=>{
    const item=document.createElement('div');
    item.className='perm-item';
    item.innerHTML=`<span class="perm-color" style="background:${c.color}"></span><div class="perm-info"><div class="perm-name" style="color:${c.color}">${c.name}</div></div><button class="btn btn-danger" onclick="confirmDeleteCat('${c.id}')">Eliminar</button>`;
    list.appendChild(item);
  });
}

function renderPermList(){
  const list=document.getElementById('perm-list');
  if(permanents.length===0){list.innerHTML='<div class="empty-state">No hay tareas permanentes aún.</div>';return;}
  list.innerHTML='';
  permanents.forEach(p=>{
    const cat=categories.find(c=>c.id===p.catId);if(!cat)return;
    const daysStr=p.days.length===7?'Todos los días':p.days.map(d=>d.slice(0,3)).join(', ');
    const item=document.createElement('div');
    item.className='perm-item';
    item.style.borderLeft=`5px solid ${cat.color}`;
    item.innerHTML=`<span class="perm-color" style="background:${cat.color}"></span><div class="perm-info"><div class="perm-name">${p.name}</div><div class="perm-meta">${cat.name} · ${p.startH}:00–${p.endH}:00 · ${daysStr}</div></div><button class="btn btn-danger" onclick="deletePermanent('${p.id}')">✕</button>`;
    list.appendChild(item);
  });
}

function renderAll(){
  renderChips();renderDayNav();renderSchedule();renderCatList();renderPermList();updateHeaderSub();
}

/* ── CELL CLICK ── */
function cellClick(key,date){
  if(!selectedCat){showStatus('★ Elige una categoría primero');return;}
  openTypeChooser(key,date);
}

function openTypeChooser(key,date){
  const cat=categories.find(c=>c.id===selectedCat);if(!cat)return;
  const[day,h]=key.split('_');
  showModal(`
    <h3>Nueva actividad</h3>
    <div class="cat-badge" style="background:${cat.color}">
      <span style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.6);display:inline-block;flex-shrink:0"></span>
      ${cat.name}
    </div>
    <div style="font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px">${day} · ${h}:00</div>
    <label>¿Qué tipo de evento?</label>
    <div class="type-grid">
      <button class="type-card" onclick="openNewTempEvent('${key}','${selectedCat}','${date}')">
        <span class="icon">📅</span>
        <span class="type-name">Solo este día</span>
        <span class="type-sub">${formatDateLabel(date)}</span>
      </button>
      <button class="type-card" onclick="openNewPermFromCell('${day}','${h}','${selectedCat}')">
        <span class="icon">🔁</span>
        <span class="type-name">Permanente</span>
        <span class="type-sub">Todas las semanas</span>
      </button>
    </div>
    <div style="margin-top:12px"><button class="btn btn-outline" style="width:100%" onclick="closeModal()">Cancelar</button></div>
  `);
}

function openNewTempEvent(key,catId,date){
  const cat=categories.find(c=>c.id===catId);if(!cat)return;
  const[day,h]=key.split('_');
  showModal(`
    <h3>Evento del día</h3>
    <div class="cat-badge" style="background:${cat.color}">
      <span style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.6);display:inline-block;flex-shrink:0"></span>
      ${cat.name}
    </div>
    <div style="font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">${day} · ${h}:00 · ${formatDateLabel(date)}</div>
    <label>Descripción (opcional)</label>
    <input type="text" id="ev-label" placeholder="ej: Cita médica" />
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn" style="background:${cat.color};border-color:${cat.color}" onclick="saveTempEvent('${key}','${catId}','${date}')">Guardar</button>
    </div>
  `);
  setTimeout(()=>document.getElementById('ev-label')?.focus(),100);
}

function saveTempEvent(key,catId,date){
  const label=document.getElementById('ev-label')?.value.trim()||'';
  events[key]={catId,label,date};
  closeModal();renderSchedule();renderCalendar();save();
}

function openNewPermFromCell(day,h,catId){
  const cat=categories.find(c=>c.id===catId);if(!cat)return;
  const startH=parseInt(h);
  const endH=Math.min(startH+1,23);
  const daysHtml=DAYS.map(d=>`<button type="button" class="day-toggle${d===day?' active':''}" data-day="${d}" data-selected="${d===day?'true':'false'}" onclick="this.dataset.selected=this.dataset.selected==='true'?'false':'true';this.classList.toggle('active',this.dataset.selected==='true')">${d.slice(0,3)}</button>`).join('');
  showModal(`
    <h3>Evento permanente</h3>
    <div class="cat-badge" style="background:${cat.color}">
      <span style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.6);display:inline-block;flex-shrink:0"></span>
      ${cat.name}
    </div>
    <label>Nombre</label>
    <input type="text" id="perm-modal-name" placeholder="ej: Reunión semanal" />
    <div class="time-row" style="margin-top:14px">
      <div><label>Hora inicio</label><select id="perm-modal-start" style="width:100%">${HOURS.map(hh=>`<option value="${hh}"${hh===startH?' selected':''}>${hh}:00</option>`).join('')}</select></div>
      <div><label>Hora fin</label><select id="perm-modal-end" style="width:100%">${HOURS.map(hh=>`<option value="${hh}"${hh===endH?' selected':''}>${hh}:00</option>`).join('')}</select></div>
    </div>
    <label>Días</label>
    <div class="day-checks" id="perm-modal-days" style="margin-top:6px">${daysHtml}</div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-neon2" onclick="savePermFromModal('${catId}')">Guardar</button>
    </div>
  `);
  setTimeout(()=>document.getElementById('perm-modal-name')?.focus(),100);
}

function savePermFromModal(catId){
  const name=document.getElementById('perm-modal-name')?.value.trim();
  const startH=parseInt(document.getElementById('perm-modal-start').value);
  const endH=parseInt(document.getElementById('perm-modal-end').value);
  const days=[...document.querySelectorAll('#perm-modal-days .day-toggle')].filter(b=>b.dataset.selected==='true').map(b=>b.dataset.day);
  if(!name){showStatus('★ Escribe un nombre');return;}
  if(endH<=startH){showStatus('★ La hora fin debe ser mayor');return;}
  if(days.length===0){showStatus('★ Elige al menos un día');return;}
  permanents.push({id:'p'+Date.now(),name,catId,startH,endH,days});
  closeModal();renderAll();save();
}

function openEditEvent(key,ev,cat){
  if(!cat)return;
  const[day,h]=key.split('_');
  showModal(`
    <h3>Editar evento</h3>
    <div style="font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">${day} · ${h}:00 · ${formatDateLabel(ev.date)}</div>
    <label>Categoría</label>
    <select id="ev-cat">${categories.map(c=>`<option value="${c.id}"${c.id===ev.catId?' selected':''}>${c.name}</option>`).join('')}</select>
    <label>Descripción</label>
    <input type="text" id="ev-label" value="${ev.label||''}" placeholder="ej: Cita médica" />
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deleteEvent('${key}')">Eliminar</button>
      <button class="btn" onclick="saveEditEvent('${key}','${ev.date}')">Guardar</button>
    </div>
  `);
  setTimeout(()=>document.getElementById('ev-label')?.focus(),100);
}

function saveEditEvent(key,date){
  const catId=document.getElementById('ev-cat').value;
  const label=document.getElementById('ev-label')?.value.trim()||'';
  events[key]={catId,label,date};
  closeModal();renderSchedule();renderCalendar();save();
}

function deleteEvent(key){
  delete events[key];closeModal();renderSchedule();renderCalendar();save();
}

function addPermanent(){
  const name=document.getElementById('perm-name').value.trim();
  const catId=document.getElementById('perm-cat').value;
  const startH=parseInt(document.getElementById('perm-start').value);
  const endH=parseInt(document.getElementById('perm-end').value);
  const days=[...document.querySelectorAll('#perm-days .day-toggle')].filter(b=>b.dataset.selected==='true').map(b=>b.dataset.day);
  if(!name){showStatus('★ Escribe un nombre');return;}
  if(!catId){showStatus('★ Elige una categoría');return;}
  if(endH<=startH){showStatus('★ La hora fin debe ser mayor');return;}
  if(days.length===0){showStatus('★ Elige al menos un día');return;}
  permanents.push({id:'p'+Date.now(),name,catId,startH,endH,days});
  document.getElementById('perm-name').value='';
  renderAll();save();
}

function deletePermanent(id){
  permanents=permanents.filter(p=>p.id!==id);renderAll();save();
}

function openPermDetail(perm){
  const cat=categories.find(c=>c.id===perm.catId);
  const daysStr=perm.days.length===7?'Todos los días':perm.days.join(', ');
  showModal(`
    <h3>${perm.name}</h3>
    <div class="cat-badge" style="background:${cat?.color||'#888'}">${cat?.name||'—'}</div>
    <div style="font-size:13px;color:var(--text2);font-weight:700;line-height:2.4;margin-top:10px">
      <div>Horario: <strong style="color:var(--text)">${perm.startH}:00 – ${perm.endH}:00</strong></div>
      <div>Días: <strong style="color:var(--text)">${daysStr}</strong></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deletePermanent('${perm.id}');closeModal()">Eliminar</button>
      <button class="btn btn-outline" onclick="closeModal()">Cerrar</button>
    </div>
  `);
}

function confirmDeleteCat(id){
  const cat=categories.find(c=>c.id===id);
  showModal(`
    <h3>¿Eliminar categoría?</h3>
    <p style="font-size:14px;color:var(--text2);font-weight:700;margin-bottom:4px">Se borrará <strong style="color:${cat?.color}">${cat?.name}</strong> y todas sus actividades.</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn" style="background:#e03;border-color:#e03" onclick="deleteCategory('${id}')">Eliminar</button>
    </div>
  `);
}

function showModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalIfBg(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

load();
</script>
